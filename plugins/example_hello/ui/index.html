<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>协作插件</title><style>body{font-family:Arial,"Microsoft YaHei",sans-serif;background:#f6f8fb;color:#243b4d;margin:0;padding:32px}.card{max-width:720px;margin:auto;background:white;border:1px solid #dce5ec;border-radius:14px;padding:28px;box-shadow:0 8px 24px #102a4312}button{background:#1677a6;color:white;border:0;border-radius:8px;padding:11px 18px;cursor:pointer}pre{white-space:pre-wrap;background:#f3f7fa;padding:14px;border-radius:8px}</style></head><body><main class="card"><h1>协作插件示例</h1><p>本页面和对应后端接口全部位于 <code>plugins/example_hello</code>，没有放入核心业务目录。</p><button id="call">调用插件接口</button><pre id="result">等待调用</pre></main><script>document.querySelector('#call').onclick=async()=>{const token=localStorage.getItem('access_token');const response=await fetch('/api/v1/plugins/example_hello/hello',{headers:{Authorization:`Bearer ${token}`}});document.querySelector('#result').textContent=JSON.stringify(await response.json(),null,2)}</script></body></html>
